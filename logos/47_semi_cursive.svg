<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="gy47" x1="0%" y1="0%" x2="100%" y2="10%">
      <stop offset="0%" stop-color="#7EC8E3"/>
      <stop offset="50%" stop-color="#4A9BD9"/>
      <stop offset="100%" stop-color="#1A365D"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="#FFFFFF"/>
  <!-- セミカーシブ — 半筆記体。読みやすさ寄り、でも手書きの温かみ -->
  <g transform="translate(400, 148)">
    <!-- 左上からの導入線 -->
    <path d="M-335,-60 L-305,-35" fill="none" stroke="url(#gy47)" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <!-- U — きれいなU字 -->
    <path d="M-305,-35 L-300,22 C-297,40 -278,44 -268,28 L-262,-32"
          fill="none" stroke="url(#gy47)" stroke-width="5" stroke-linecap="round"/>
    <!-- 小さな繋ぎ -->
    <path d="M-262,-32 L-250,-35" fill="none" stroke="url(#gy47)" stroke-width="1.5" stroke-linecap="round"/>
    <!-- M — きれいだが手書き感のあるM -->
    <path d="M-240,-35 L-238,32 L-215,-35 L-192,32 L-190,-35"
          fill="none" stroke="url(#gy47)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 繋ぎ -->
    <path d="M-190,-35 C-185,-40 -178,-35 -172,-28" fill="none" stroke="url(#gy47)" stroke-width="1.5" stroke-linecap="round"/>
    <!-- I — 太く、下端にはね -->
    <path d="M-165,-28 L-162,32 C-158,40 -148,35 -142,22"
          fill="none" stroke="url(#gy47)" stroke-width="6" stroke-linecap="round"/>
    <!-- Iの点（水滴風） -->
    <circle cx="-163" cy="-42" r="4" fill="url(#gy47)"/>
    <!-- D — 分離して配置 -->
    <path d="M-115,-32 L-115,35" fill="none" stroke="url(#gy47)" stroke-width="5.5" stroke-linecap="round"/>
    <path d="M-115,-32 C-85,-38 -60,-15 -60,5 C-60,25 -85,40 -115,35"
          fill="none" stroke="url(#gy47)" stroke-width="3" stroke-linecap="round"/>
    <!-- A — やや崩した -->
    <path d="M-22,35 L12,-35 L48,35 M-8,10 L35,10"
          fill="none" stroke="url(#gy47)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- S — 流れるS＋フィニッシュ -->
    <path d="M78,-20 C72,-38 55,-42 52,-25 C48,-5 85,2 82,25 C80,40 62,42 52,32"
          fill="none" stroke="url(#gy47)" stroke-width="4.5" stroke-linecap="round"/>
    <!-- フィニッシュストローク -->
    <path d="M52,32 C90,18 170,-2 280,-15" fill="none" stroke="url(#gy47)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>
