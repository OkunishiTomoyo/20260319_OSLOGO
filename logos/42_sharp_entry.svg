    <path d="M-25,38 L10,-25 L45,38" fill="none" stroke="url(#gy42)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M-12,15 L32,15" fill="none" stroke="url(#gy42)" stroke-width="5" stroke-linecap="round"/>
    <!-- S -->
    <path d="M70,-15 C65,-30 50,-35 48,-20 C45,0 82,5 80,28 C78,42 62,45 52,35"
          fill="none" stroke="url(#gy42)" stroke-width="4" stroke-linecap="round"/>
    <!-- 長い水平フィニッシュ -->
    <path d="M52,35 C100,15 200,-5 320,-18" fill="none" stroke="url(#gy42)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  </g>
