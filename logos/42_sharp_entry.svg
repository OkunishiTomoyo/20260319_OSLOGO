    <!-- 大胆な左下からの導入ストローク -->
    <path d="M-350,80 L-290,-25" fill="none" stroke="url(#gy42)" stroke-width="2" stroke-linecap="round"/>
    <!-- U -->
    <path d="M-290,-25 L-285,30 C-282,45 -265,48 -255,30 L-250,-20"
          fill="none" stroke="url(#gy42)" stroke-width="5" stroke-linecap="round"/>
    <!-- M — 筆圧変化のある -->
    <path d="M-250,-20 L-240,35" fill="none" stroke="url(#gy42)" stroke-width="6" stroke-linecap="round"/>
    <path d="M-240,35 L-215,-25" fill="none" stroke="url(#gy42)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M-215,-25 L-190,35" fill="none" stroke="url(#gy42)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M-190,35 L-180,-20" fill="none" stroke="url(#gy42)" stroke-width="6" stroke-linecap="round"/>
    <!-- I -->
    <path d="M-160,-25 L-155,40 C-152,48 -142,42 -135,30"
          fill="none" stroke="url(#gy42)" stroke-width="6" stroke-linecap="round"/>
    <!-- D -->
    <path d="M-115,-20 L-112,38" fill="none" stroke="url(#gy42)" stroke-width="5.5" stroke-linecap="round"/>
    <path d="M-112,-22 C-80,-30 -58,-8 -58,10 C-58,30 -80,42 -112,38"
          fill="none" stroke="url(#gy42)" stroke-width="2.5" stroke-linecap="round"/>
