<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="g20" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7EC8E3"/>
      <stop offset="50%" stop-color="#4A9BD9"/>
      <stop offset="100%" stop-color="#2B6CB0"/>
    </linearGradient>
    <linearGradient id="g20b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2B6CB0"/>
      <stop offset="100%" stop-color="#1A365D"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="#FFFFFF"/>
  <!-- カレントタイプ — 海流に乗る文字 -->
  <g transform="translate(400, 140)">
    <!-- 背景の大きな海流カーブ -->
    <path d="M-320,50 C-200,10 -80,80 40,30 C160,-20 260,60 320,20" fill="none" stroke="url(#g20)" stroke-width="50" stroke-linecap="round" opacity="0.08"/>
    <!-- 中間の海流 -->
    <path d="M-300,50 C-180,20 -60,70 60,35 C180,0 260,55 310,25" fill="none" stroke="url(#g20)" stroke-width="3" stroke-linecap="round" opacity="0.2"/>
  </g>
  <!-- UMIDAS テキスト（大きく中央に） -->
  <text x="400" y="210" text-anchor="middle" font-family="'Montserrat', 'Helvetica Neue', sans-serif" font-size="90" font-weight="700" letter-spacing="12" fill="#1A365D">UMIDAS</text>
  <!-- Iのドットを水滴に -->
  <circle cx="342" cy="138" r="7" fill="url(#g20)"/>
  <!-- 下部のアクセント -->
  <path d="M130,235 Q280,225 400,240 Q520,255 670,235" fill="none" stroke="url(#g20)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <!-- サブテキスト -->
  <text x="400" y="290" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="15" font-weight="500" fill="#2B6CB0" letter-spacing="10">生 み 出 す</text>
  <!-- ミニタグライン -->
  <text x="400" y="325" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="11" fill="#4A9BD9" letter-spacing="3">心に余裕を生み出す</text>
</svg>
