  <g transform="translate(400, 120)">
    <text x="-232" y="0" text-anchor="middle" font-family="'Nunito', 'Quicksand', 'Rounded Mplus 1c', sans-serif" font-size="86" font-weight="700" fill="#0F2B4A">U</text>
    <text x="-138" y="0" text-anchor="middle" font-family="'Nunito', 'Quicksand', 'Rounded Mplus 1c', sans-serif" font-size="86" font-weight="700" fill="#1B5A8C">M</text>
    <!-- I — 本体 -->
    <text x="-58" y="0" text-anchor="middle" font-family="'Nunito', 'Quicksand', 'Rounded Mplus 1c', sans-serif" font-size="86" font-weight="700" fill="#3186BE">I</text>
    <!-- Iのドットを水滴に上書き -->
    <rect x="-67" y="-68" width="18" height="15" fill="#FFFFFF"/>
    <path d="M-58,-68 C-56,-63 -50,-52 -50,-46 C-50,-40 -54,-36 -58,-36 C-62,-36 -66,-40 -66,-46 C-66,-52 -60,-63 -58,-68Z" fill="#3186BE"/>
    <text x="12" y="0" text-anchor="middle" font-family="'Nunito', 'Quicksand', 'Rounded Mplus 1c', sans-serif" font-size="86" font-weight="700" fill="#52A3D4">D</text>
    <text x="100" y="0" text-anchor="middle" font-family="'Nunito', 'Quicksand', 'Rounded Mplus 1c', sans-serif" font-size="86" font-weight="700" fill="#7EC8E3">A</text>
    <text x="182" y="0" text-anchor="middle" font-family="'Nunito', 'Quicksand', 'Rounded Mplus 1c', sans-serif" font-size="86" font-weight="700" fill="#B0DFEF">S</text>
