<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="g14" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7EC8E3"/>
      <stop offset="100%" stop-color="#2B6CB0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="#FFFFFF"/>
  <!-- 縦組みBOLD — アクロシールズ系の固めデザイン -->
  <g transform="translate(400, 200)">
    <!-- メイン文字 UMIDAS -->
    <text x="0" y="-20" text-anchor="middle" font-family="'Montserrat', 'Helvetica Neue', sans-serif" font-size="100" font-weight="800" letter-spacing="6" fill="#1A365D">UMIDAS</text>
    <!-- アンダーバー（水のライン） -->
    <rect x="-230" y="10" width="460" height="4" rx="2" fill="url(#g14)"/>
    <!-- 日本語サブ -->
    <text x="0" y="50" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="16" font-weight="500" fill="#2B6CB0" letter-spacing="12">生 み 出 す</text>
    <!-- 左のアクセントライン -->
    <line x1="-230" y1="-75" x2="-230" y2="10" stroke="url(#g14)" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
