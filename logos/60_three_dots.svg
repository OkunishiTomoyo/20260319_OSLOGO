<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="800" height="260">
  <defs>
    <linearGradient id="gc60t" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5BA4D9"/>
      <stop offset="100%" stop-color="#2E75B6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="260" fill="#FFFFFF"/>
  <!-- スリードッツ — 3つの円が並ぶ（freee/Wantedly風のシンプルマーク） -->
  <g transform="translate(148, 125)">
    <!-- 左の円（水色） -->
    <circle cx="-35" cy="5" r="22" fill="#A3D9F5"/>
    <!-- 中央の円（中間色・やや大きい） -->
    <circle cx="5" cy="-8" r="28" fill="#6BB8E8"/>
    <!-- 右の円（青） -->
    <circle cx="40" cy="10" r="18" fill="#3B82C4"/>
    <!-- 重なりの白ハイライト -->
    <circle cx="-8" cy="-2" r="6" fill="#FFFFFF" opacity="0.25"/>
    <circle cx="25" cy="2" r="4" fill="#FFFFFF" opacity="0.2"/>
  </g>
  <!-- テキスト -->
  <text x="478" y="118" text-anchor="middle" font-family="'Nunito', 'Quicksand', sans-serif" font-size="60" font-weight="700" letter-spacing="7" fill="url(#gc60t)">UMIDAS</text>
  <text x="478" y="150" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="11" letter-spacing="4" fill="#5BA4D9" opacity="0.6">心に余裕を生み出す</text>
</svg>
