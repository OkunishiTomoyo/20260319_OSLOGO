<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="gt25" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7EC8E3"/>
      <stop offset="100%" stop-color="#2B6CB0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="#FFFFFF"/>
  <!-- ワイドレタースペーシング — 呼吸感のある広い字間 -->
  <g transform="translate(400, 130)">
    <!-- メイン文字（超広い字間） -->
    <text x="0" y="0" text-anchor="middle" font-family="'Montserrat', 'Helvetica Neue', sans-serif" font-size="72" font-weight="300" letter-spacing="42" fill="#1A365D">UMIDAS</text>
    <!-- 下部の細いグラデーションライン -->
    <rect x="-310" y="18" width="620" height="2" rx="1" fill="url(#gt25)"/>
    <!-- さらに下に日本語 -->
    <text x="0" y="52" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="11" font-weight="400" letter-spacing="16" fill="#4A9BD9">生 み 出 す</text>
  </g>
</svg>
