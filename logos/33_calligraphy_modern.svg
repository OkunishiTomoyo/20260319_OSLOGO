<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="gb33" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7EC8E3"/>
      <stop offset="100%" stop-color="#2B6CB0"/>
    </linearGradient>
    <linearGradient id="gb33v" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A8DEF0"/>
      <stop offset="100%" stop-color="#2B6CB0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="#FFFFFF"/>
  <!-- モダンカリグラフィー — 太い/細いのコントラストが強い -->
  <g transform="translate(400, 155)">
    <!-- U — 入りは細く、底は太く -->
    <path d="M-300,-45 C-302,-20 -300,15 -290,28 C-278,42 -262,38 -258,20 C-254,2 -252,-28 -250,-45" fill="none" stroke="url(#gb33v)" stroke-width="3" stroke-linecap="round">
      <animate attributeName="stroke-width" values="3;10;3" dur="0s"/>
    </path>
    <!-- 太さ変化をシミュレート：2本重ねて表現 -->
    <path d="M-300,-45 C-302,-20 -300,15 -290,28 C-278,42 -262,38 -258,20 C-254,2 -252,-28 -250,-45" fill="none" stroke="url(#gb33v)" stroke-width="3" stroke-linecap="round"/>
    <path d="M-300,5 C-298,18 -292,30 -290,28 C-278,42 -262,38 -258,20 C-256,12 -254,0 -252,-5" fill="none" stroke="url(#gb33v)" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
    <!-- M — シャープなジグザグ -->
    <path d="M-225,38 L-222,-48" fill="none" stroke="url(#gb33)" stroke-width="9" stroke-linecap="round"/>
    <path d="M-222,-48 L-195,25" fill="none" stroke="url(#gb33)" stroke-width="3" stroke-linecap="round"/>
    <path d="M-195,25 L-168,-48" fill="none" stroke="url(#gb33)" stroke-width="3" stroke-linecap="round"/>
    <path d="M-168,-48 L-165,38" fill="none" stroke="url(#gb33)" stroke-width="9" stroke-linecap="round"/>
    <!-- I — 極太の一本 -->
    <path d="M-135,-48 L-133,32" fill="none" stroke="url(#gb33)" stroke-width="12" stroke-linecap="round"/>
    <!-- 上のはね -->
    <path d="M-133,32 C-128,38 -120,36 -115,28" fill="none" stroke="url(#gb33)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- D — 太い縦棒 + 細いカーブ -->
    <path d="M-90,38 L-90,-48" fill="none" stroke="url(#gb33)" stroke-width="10" stroke-linecap="round"/>
    <path d="M-90,-48 C-60,-52 -38,-28 -38,0 C-38,28 -60,42 -90,38" fill="none" stroke="url(#gb33)" stroke-width="3" stroke-linecap="round"/>
    <!-- A — 細い線で鋭く -->
    <path d="M-5,38 L30,-48 L65,38" fill="none" stroke="url(#gb33)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M8,10 L52,10" fill="none" stroke="url(#gb33)" stroke-width="8" stroke-linecap="round"/>
    <!-- S — うねり -->
    <path d="M108,-28 C98,-50 72,-52 70,-32 C67,-5 112,0 110,25 C108,45 78,48 68,32" fill="none" stroke="url(#gb33)" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
