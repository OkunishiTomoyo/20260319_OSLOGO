<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="g17" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7EC8E3"/>
      <stop offset="100%" stop-color="#2B6CB0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="#FFFFFF"/>
  <!-- UMIDASの「D」を水滴にする — 文字内モチーフ -->
  <g transform="translate(400, 180)">
    <!-- U -->
    <text x="-245" y="0" font-family="'Montserrat', 'Helvetica Neue', sans-serif" font-size="80" font-weight="600" fill="#1A365D">U</text>
    <!-- M -->
    <text x="-185" y="0" font-family="'Montserrat', 'Helvetica Neue', sans-serif" font-size="80" font-weight="600" fill="#1A365D">M</text>
    <!-- I -->
    <text x="-100" y="0" font-family="'Montserrat', 'Helvetica Neue', sans-serif" font-size="80" font-weight="600" fill="#1A365D">I</text>
    <!-- D → 水滴形 -->
    <g transform="translate(-40, -25)">
      <path d="M0,-35 C4,-30 22,-8 22,10 C22,25 12,35 0,35 C-12,35 -22,25 -22,10 C-22,-8 -4,-30 0,-35Z" fill="url(#g17)"/>
    </g>
    <!-- A -->
    <text x="20" y="0" font-family="'Montserrat', 'Helvetica Neue', sans-serif" font-size="80" font-weight="600" fill="#1A365D">A</text>
    <!-- S -->
    <text x="80" y="0" font-family="'Montserrat', 'Helvetica Neue', sans-serif" font-size="80" font-weight="600" fill="#1A365D">S</text>
  </g>
  <!-- サブテキスト -->
  <text x="400" y="260" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="13" fill="#4A9BD9" letter-spacing="6">一滴が、すべてを変える</text>
</svg>
