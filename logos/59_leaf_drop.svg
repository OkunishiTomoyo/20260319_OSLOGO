<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="800" height="260">
  <defs>
    <linearGradient id="gc59" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#A3D9F5"/>
      <stop offset="45%" stop-color="#6BB8E8"/>
      <stop offset="100%" stop-color="#3B82C4"/>
    </linearGradient>
    <linearGradient id="gc59b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#89CFF0"/>
      <stop offset="100%" stop-color="#5BA4D9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="260" fill="#FFFFFF"/>
  <!-- リーフドロップ — 葉っぱと水滴の融合（ユーグレナ/トヨタ系の有機マーク） -->
  <g transform="translate(150, 120)">
    <!-- 葉/水滴のハイブリッド形 -->
    <path d="M0,-52 C25,-35 48,-5 48,15 C48,40 25,55 0,55 C-25,55 -48,40 -48,15 C-48,-5 -25,-35 0,-52Z"
          fill="url(#gc59)" opacity="0.15"/>
    <path d="M0,-52 C25,-35 48,-5 48,15 C48,40 25,55 0,55 C-25,55 -48,40 -48,15 C-48,-5 -25,-35 0,-52Z"
          fill="none" stroke="url(#gc59)" stroke-width="3"/>
    <!-- 中央の葉脈/水流ライン -->
    <path d="M0,-30 C0,-10 0,15 0,38" fill="none" stroke="url(#gc59b)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M0,0 C-12,8 -22,12 -28,10" fill="none" stroke="url(#gc59b)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <path d="M0,-10 C12,0 22,2 28,-2" fill="none" stroke="url(#gc59b)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <path d="M0,15 C-10,22 -18,24 -22,22" fill="none" stroke="url(#gc59b)" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  </g>
  <!-- テキスト -->
  <text x="478" y="115" text-anchor="middle" font-family="'Nunito', 'Quicksand', sans-serif" font-size="58" font-weight="700" letter-spacing="7" fill="#2E75B6">UMIDAS</text>
  <text x="478" y="148" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="11" letter-spacing="4" fill="#5BA4D9" opacity="0.6">心に余裕を生み出す</text>
</svg>
