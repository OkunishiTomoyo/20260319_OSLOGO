<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="800" height="260">
  <defs>
    <linearGradient id="gc58" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A3D9F5"/>
      <stop offset="40%" stop-color="#6BB8E8"/>
      <stop offset="100%" stop-color="#3B82C4"/>
    </linearGradient>
    <linearGradient id="gc58b" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#89CFF0"/>
      <stop offset="100%" stop-color="#5BA4D9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="260" fill="#FFFFFF"/>
  <!-- オープンサークル — 開いた円（成長を止めない）(マネーフォワード/Chatwork風) -->
  <g transform="translate(150, 125)">
    <!-- 開いた円（上部が開いている） -->
    <path d="M42,20 C48,-5 42,-30 25,-42 C8,-52 -15,-50 -30,-38 C-48,-22 -52,5 -42,28 C-35,42 -18,52 0,52 C15,52 28,45 35,35"
          fill="none" stroke="url(#gc58)" stroke-width="8" stroke-linecap="round"/>
    <!-- 開いた部分から飛び出す水滴 -->
    <circle cx="30" cy="-42" r="5" fill="#89CFF0" opacity="0.7"/>
    <circle cx="42" cy="-32" r="3.5" fill="#6BB8E8" opacity="0.5"/>
    <circle cx="22" cy="-52" r="3" fill="#A3D9F5" opacity="0.5"/>
  </g>
  <!-- テキスト -->
  <text x="478" y="118" text-anchor="middle" font-family="'Nunito', 'Quicksand', sans-serif" font-size="60" font-weight="700" letter-spacing="7" fill="#2E75B6">UMIDAS</text>
  <text x="478" y="150" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="11" letter-spacing="4" fill="#5BA4D9" opacity="0.6">心に余裕を生み出す</text>
</svg>
