<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="800" height="260">
  <defs>
    <linearGradient id="gc51" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#89CFF0"/>
      <stop offset="50%" stop-color="#5BA4D9"/>
      <stop offset="100%" stop-color="#3B82C4"/>
    </linearGradient>
    <linearGradient id="gc51t" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5BA4D9"/>
      <stop offset="100%" stop-color="#3B82C4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="260" fill="#FFFFFF"/>
  <!-- 丸みのあるU字マーク+水滴 — 可愛さ×誠実 -->
  <g transform="translate(155, 125)">
    <!-- Uの器（丸みを帯びた） -->
    <path d="M-42,-50 L-42,8 C-42,38 -22,52 0,52 C22,52 42,38 42,8 L42,-50"
          fill="none" stroke="url(#gc51)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 水滴（Uの中から溢れ出す） -->
    <path d="M0,-22 C2,-19 8,-10 8,-4 C8,2 4,6 0,6 C-4,6 -8,2 -8,-4 C-8,-10 -2,-19 0,-22Z" fill="url(#gc51)" opacity="0.7"/>
    <!-- 小さな水滴たち（溢れ出す） -->
    <circle cx="-18" cy="-42" r="4" fill="#89CFF0" opacity="0.6"/>
    <circle cx="20" cy="-48" r="3" fill="#5BA4D9" opacity="0.5"/>
    <circle cx="8" cy="-55" r="2.5" fill="#89CFF0" opacity="0.4"/>
  </g>
  <!-- テキスト UMIDAS -->
  <text x="470" y="118" text-anchor="middle" font-family="'Nunito', 'Quicksand', 'Rounded Mplus 1c', sans-serif" font-size="62" font-weight="700" letter-spacing="8" fill="url(#gc51t)">UMIDAS</text>
  <!-- タグライン -->
  <text x="470" y="152" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="11" font-weight="400" letter-spacing="5" fill="#5BA4D9" opacity="0.7">心に余裕を生み出す</text>
</svg>
