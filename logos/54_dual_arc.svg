<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="800" height="260">
  <defs>
    <linearGradient id="gc54a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A3D9F5"/>
      <stop offset="100%" stop-color="#5BA4D9"/>
    </linearGradient>
    <linearGradient id="gc54b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5BA4D9"/>
      <stop offset="100%" stop-color="#2E75B6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="260" fill="#FFFFFF"/>
  <!-- デュアルアーク — 2つの弧が寄り添う（NTT/ソフトバンク風の抽象マーク） -->
  <g transform="translate(152, 122)">
    <!-- 弧1（水色寄り・外側） -->
    <path d="M-35,-45 C-55,-30 -55,30 -35,45" fill="none" stroke="url(#gc54a)" stroke-width="9" stroke-linecap="round"/>
    <!-- 弧2（青寄り・内側） -->
    <path d="M-12,-38 C-28,-22 -28,22 -12,38" fill="none" stroke="url(#gc54b)" stroke-width="9" stroke-linecap="round"/>
    <!-- 2つの弧の間に小さな水滴 -->
    <circle cx="-24" cy="0" r="5" fill="#89CFF0" opacity="0.5"/>
    <!-- 右側にも対称的な弧（開いた形=溢れ出す） -->
    <path d="M12,-38 C28,-22 28,22 12,38" fill="none" stroke="url(#gc54a)" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
    <path d="M35,-45 C55,-30 55,30 35,45" fill="none" stroke="url(#gc54b)" stroke-width="4" stroke-linecap="round" opacity="0.25"/>
  </g>
  <!-- テキスト -->
  <text x="478" y="115" text-anchor="middle" font-family="'Nunito', 'Quicksand', sans-serif" font-size="60" font-weight="700" letter-spacing="7" fill="#2E75B6">UMIDAS</text>
  <text x="478" y="148" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="11" letter-spacing="4" fill="#5BA4D9" opacity="0.65">心に余裕を生み出す</text>
</svg>
