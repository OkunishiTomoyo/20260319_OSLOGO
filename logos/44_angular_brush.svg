<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="gy44" x1="0%" y1="0%" x2="100%" y2="20%">
      <stop offset="0%" stop-color="#7EC8E3"/>
      <stop offset="40%" stop-color="#4A9BD9"/>
      <stop offset="100%" stop-color="#2B6CB0"/>
    </linearGradient>
    <linearGradient id="gy44b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A9BD9"/>
      <stop offset="100%" stop-color="#1A365D"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="#FFFFFF"/>
  <!-- アンギュラーブラッシュ — 角度のある筆で書いた文字。読みやすさを保持 -->
  <g transform="translate(400, 152)">
    <!-- U — 角度のある筆 -->
    <path d="M-295,-42 C-296,-10 -294,20 -282,32 C-270,42 -258,32 -255,10 L-252,-38"
          fill="none" stroke="url(#gy44)" stroke-width="7" stroke-linecap="square"/>
    <!-- M -->
    <path d="M-225,36 L-222,-42" fill="none" stroke="url(#gy44)" stroke-width="7" stroke-linecap="square"/>
    <path d="M-222,-42 L-198,20" fill="none" stroke="url(#gy44)" stroke-width="3" stroke-linecap="square"/>
    <path d="M-198,20 L-175,-42" fill="none" stroke="url(#gy44)" stroke-width="3" stroke-linecap="square"/>
    <path d="M-175,-42 L-172,36" fill="none" stroke="url(#gy44)" stroke-width="7" stroke-linecap="square"/>
    <!-- I — 太い＋上下のセリフ風ストローク -->
    <path d="M-148,-42 L-145,36" fill="none" stroke="url(#gy44)" stroke-width="8" stroke-linecap="square"/>
    <path d="M-158,-42 L-135,-42" fill="none" stroke="url(#gy44)" stroke-width="2" stroke-linecap="square"/>
    <!-- D -->
    <path d="M-112,36 L-112,-42" fill="none" stroke="url(#gy44)" stroke-width="7" stroke-linecap="square"/>
    <path d="M-112,-42 C-78,-48 -55,-22 -55,0 C-55,22 -78,40 -112,36"
          fill="none" stroke="url(#gy44)" stroke-width="3" stroke-linecap="round"/>
    <!-- A -->
    <path d="M-18,36 L18,-42 L52,36" fill="none" stroke="url(#gy44)" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter"/>
    <path d="M-5,10 L40,10" fill="none" stroke="url(#gy44)" stroke-width="7" stroke-linecap="square"/>
    <!-- S -->
    <path d="M95,-25 C88,-42 68,-48 65,-30 C62,-10 98,-2 98,22 C98,42 72,46 60,32"
          fill="none" stroke="url(#gy44)" stroke-width="5" stroke-linecap="square"/>
    <!-- Yohji的 — Sから伸びる長い斜めストローク -->
    <path d="M60,32 L55,36" fill="none" stroke="url(#gy44b)" stroke-width="5" stroke-linecap="square"/>
    <path d="M55,36 C110,12 180,-8 300,-22" fill="none" stroke="url(#gy44b)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <!-- 導入ストローク（左上から） -->
    <path d="M-330,-68 L-298,-42" fill="none" stroke="url(#gy44)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>
