<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="gb38" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7EC8E3"/>
      <stop offset="50%" stop-color="#4A9BD9"/>
      <stop offset="100%" stop-color="#1A365D"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="#FFFFFF"/>
  <!-- ストロークコントラスト — 極太と極細が共存するYohji風 -->
  <g transform="translate(400, 158)">
    <!-- U — 左が太い、右が細い -->
    <path d="M-308,-48 L-308,18 Q-308,42 -282,42 Q-256,42 -256,18 L-256,-48" fill="none" stroke="url(#gb38)" stroke-width="12" stroke-linecap="round"/>
    <path d="M-256,-48 L-256,18 Q-256,42 -282,42" fill="none" stroke="url(#gb38)" stroke-width="2" stroke-linecap="round"/>
    <!-- M — 縦太、斜め細 -->
    <path d="M-228,40 L-228,-48" fill="none" stroke="url(#gb38)" stroke-width="12" stroke-linecap="round"/>
    <path d="M-228,-48 L-198,22" fill="none" stroke="url(#gb38)" stroke-width="2" stroke-linecap="round"/>
    <path d="M-198,22 L-168,-48" fill="none" stroke="url(#gb38)" stroke-width="2" stroke-linecap="round"/>
    <path d="M-168,-48 L-168,40" fill="none" stroke="url(#gb38)" stroke-width="12" stroke-linecap="round"/>
    <!-- I — 超極太 -->
    <path d="M-138,-48 L-138,40" fill="none" stroke="url(#gb38)" stroke-width="16" stroke-linecap="round"/>
    <!-- D — 縦太、カーブ細 -->
    <path d="M-100,40 L-100,-48" fill="none" stroke="url(#gb38)" stroke-width="12" stroke-linecap="round"/>
    <path d="M-100,-48 Q-55,-50 -55,0 Q-55,42 -100,40" fill="none" stroke="url(#gb38)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- A — 斜め細、横太 -->
    <path d="M-15,40 L20,-48 L55,40" fill="none" stroke="url(#gb38)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M-2,10 L42,10" fill="none" stroke="url(#gb38)" stroke-width="10" stroke-linecap="round"/>
    <!-- S — 上細、下太 -->
    <path d="M102,-30 Q92,-48 78,-48 Q62,-48 62,-30 Q62,-12 90,-8" fill="none" stroke="url(#gb38)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M90,-8 Q118,-4 118,18 Q118,42 95,42 Q75,42 68,30" fill="none" stroke="url(#gb38)" stroke-width="10" stroke-linecap="round"/>
  </g>
</svg>
