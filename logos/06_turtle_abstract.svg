<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="g6a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7EC8E3"/>
      <stop offset="100%" stop-color="#2B6CB0"/>
    </linearGradient>
    <linearGradient id="g6b" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A8DEF0"/>
      <stop offset="100%" stop-color="#4A9BD9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="#FFFFFF"/>

  <!-- 海ガメの抽象化マーク — 甲羅＝円形+内部パターン -->
  <g transform="translate(190, 170)">
    <!-- 甲羅の外形（円形） -->
    <circle cx="0" cy="0" r="65" fill="url(#g6a)" opacity="0.15"/>
    <circle cx="0" cy="0" r="65" fill="none" stroke="url(#g6a)" stroke-width="3"/>

    <!-- 甲羅の内部パターン（抽象的な曲線） -->
    <path d="M-30,-50 Q0,-25 30,-50" fill="none" stroke="#4A9BD9" stroke-width="2" stroke-linecap="round"/>
    <path d="M-50,-20 Q0,5 50,-20" fill="none" stroke="#4A9BD9" stroke-width="2" stroke-linecap="round"/>
    <path d="M-50,15 Q0,40 50,15" fill="none" stroke="#2B6CB0" stroke-width="2" stroke-linecap="round"/>
    <path d="M-30,45 Q0,60 30,45" fill="none" stroke="#2B6CB0" stroke-width="2" stroke-linecap="round"/>

    <!-- 頭（右上に小さな突起） -->
    <circle cx="55" cy="-40" r="10" fill="url(#g6a)" opacity="0.6"/>

    <!-- 前ヒレ（右上、左下に有機的カーブ） -->
    <path d="M50,-15 Q80,-30 75,-50" fill="none" stroke="url(#g6a)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M-50,15 Q-80,30 -75,50" fill="none" stroke="url(#g6a)" stroke-width="2.5" stroke-linecap="round"/>

    <!-- 後ヒレ -->
    <path d="M40,40 Q60,55 55,65" fill="none" stroke="url(#g6a)" stroke-width="2" stroke-linecap="round"/>
    <path d="M-40,-40 Q-60,-55 -55,-65" fill="none" stroke="url(#g6a)" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- テキスト -->
  <text x="500" y="160" text-anchor="middle" font-family="'Montserrat', 'Helvetica Neue', sans-serif" font-size="66" font-weight="600" letter-spacing="8" fill="#1A365D" dx="30">UMIDAS</text>

  <!-- サブテキスト -->
  <text x="530" y="200" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="12" fill="#4A9BD9" letter-spacing="3">幸せを運ぶ、海を渡る</text>

  <!-- 下部ライン -->
  <line x1="300" y1="230" x2="760" y2="230" stroke="#7EC8E3" stroke-width="1" opacity="0.5"/>
</svg>
