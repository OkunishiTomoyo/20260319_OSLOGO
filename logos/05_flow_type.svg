<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7EC8E3"/>
      <stop offset="50%" stop-color="#4A9BD9"/>
      <stop offset="100%" stop-color="#2B6CB0"/>
    </linearGradient>
    <linearGradient id="g5b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A8DEF0"/>
      <stop offset="100%" stop-color="#7EC8E3"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="#FFFFFF"/>

  <!-- 流れるロゴタイプ — 文字の太さが左→右で変化 -->
  <g transform="translate(400, 180)">
    <!-- U -->
    <text x="-280" y="0" font-family="'Montserrat', 'Helvetica Neue', sans-serif" font-size="88" font-weight="400" fill="url(#g5)" letter-spacing="2">U</text>
    <!-- M -->
    <text x="-210" y="0" font-family="'Montserrat', 'Helvetica Neue', sans-serif" font-size="88" font-weight="450" fill="url(#g5)" letter-spacing="2">M</text>
    <!-- I -->
    <text x="-130" y="0" font-family="'Montserrat', 'Helvetica Neue', sans-serif" font-size="88" font-weight="500" fill="url(#g5)" letter-spacing="2">I</text>
    <!-- D -->
    <text x="-85" y="0" font-family="'Montserrat', 'Helvetica Neue', sans-serif" font-size="88" font-weight="600" fill="url(#g5)" letter-spacing="2">D</text>
    <!-- A -->
    <text x="-15" y="0" font-family="'Montserrat', 'Helvetica Neue', sans-serif" font-size="88" font-weight="700" fill="url(#g5)" letter-spacing="2">A</text>
    <!-- S -->
    <text x="60" y="0" font-family="'Montserrat', 'Helvetica Neue', sans-serif" font-size="88" font-weight="800" fill="url(#g5)" letter-spacing="2">S</text>
  </g>

  <!-- 流れる波のアクセントライン（文字下） -->
  <path d="M110,220 Q200,210 300,218 Q400,228 500,215 Q600,205 690,222" fill="none" stroke="url(#g5b)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Sから溢れ出すドロップ -->
  <circle cx="680" cy="195" r="4" fill="#2B6CB0" opacity="0.6"/>
  <circle cx="695" cy="205" r="3" fill="#2B6CB0" opacity="0.4"/>
  <circle cx="705" cy="200" r="2" fill="#4A9BD9" opacity="0.3"/>

  <!-- サブテキスト -->
  <text x="400" y="280" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="14" fill="#4A9BD9" letter-spacing="6">静 か に 満 ち て 、 溢 れ 出 す</text>
</svg>
