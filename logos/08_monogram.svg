<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="g8" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7EC8E3"/>
      <stop offset="50%" stop-color="#4A9BD9"/>
      <stop offset="100%" stop-color="#2B6CB0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="#FFFFFF"/>

  <!-- モノグラム「U」— 器から水が溢れるスタイリッシュなU -->
  <g transform="translate(200, 170)">
    <!-- Uの左縦棒 -->
    <rect x="-45" y="-60" width="10" height="95" rx="5" fill="url(#g8)"/>
    <!-- Uの右縦棒 -->
    <rect x="35" y="-60" width="10" height="95" rx="5" fill="url(#g8)"/>
    <!-- Uの底カーブ -->
    <path d="M-40,35 Q-40,65 0,65 Q40,65 40,35" fill="none" stroke="url(#g8)" stroke-width="10" stroke-linecap="round"/>

    <!-- 溢れるライン（左） -->
    <path d="M-45,-60 Q-60,-70 -68,-55" fill="none" stroke="#7EC8E3" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <path d="M-45,-45 Q-65,-50 -72,-35" fill="none" stroke="#7EC8E3" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

    <!-- 溢れるライン（右） -->
    <path d="M45,-60 Q60,-70 68,-55" fill="none" stroke="#7EC8E3" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <path d="M45,-45 Q65,-50 72,-35" fill="none" stroke="#7EC8E3" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

    <!-- 水面ライン -->
    <path d="M-32,-20 Q-15,-30 0,-20 Q15,-10 32,-20" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- UMIDAS テキスト -->
  <text x="500" y="185" text-anchor="middle" font-family="'Montserrat', 'Helvetica Neue', sans-serif" font-size="52" font-weight="600" letter-spacing="14" fill="#1A365D" dx="40">UMIDAS</text>

  <!-- 下部ライン -->
  <line x1="340" y1="210" x2="760" y2="210" stroke="#7EC8E3" stroke-width="1.5" opacity="0.4"/>

  <!-- サブテキスト -->
  <text x="550" y="240" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="13" fill="#4A9BD9" letter-spacing="5">心 に 余 裕 を 生 み 出 す</text>
</svg>
