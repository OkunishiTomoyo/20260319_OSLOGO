      <stop offset="0%" stop-color="#D6EEF9"/>
      <stop offset="18%" stop-color="#8AD0F0"/>
      <stop offset="40%" stop-color="#4FA8DB"/>
      <stop offset="65%" stop-color="#2970B5"/>
