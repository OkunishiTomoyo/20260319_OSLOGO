    <!-- Iのドットを水滴に上書き -->
    <rect x="18" y="-68" width="20" height="14" fill="#FFFFFF"/>
    <path d="M28,-68 C30,-64 36,-54 36,-48 C36,-42 32,-38 28,-38 C24,-38 20,-42 20,-48 C20,-54 26,-64 28,-68Z" fill="url(#g72a)"/>
    <text x="135" y="0" text-anchor="middle" font-family="'Montserrat', 'Helvetica Neue', sans-serif" font-size="92" font-weight="800" letter-spacing="2" fill="url(#g72)">DAS</text>
