<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="g13" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7EC8E3"/>
      <stop offset="100%" stop-color="#2B6CB0"/>
    </linearGradient>
    <linearGradient id="g13b" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#2B6CB0"/>
      <stop offset="100%" stop-color="#7EC8E3"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="#FFFFFF"/>
  <!-- 水平線+日の出 — 新しい価値が生まれる瞬間 -->
  <g transform="translate(400, 165)">
    <!-- 水平線 -->
    <line x1="-300" y1="20" x2="300" y2="20" stroke="#1A365D" stroke-width="2" opacity="0.15"/>
    <!-- 半円（日の出/水面から何かが生まれる） -->
    <path d="M-45,20 A45,45 0 0,1 45,20" fill="url(#g13b)" opacity="0.2"/>
    <path d="M-45,20 A45,45 0 0,1 45,20" fill="none" stroke="url(#g13)" stroke-width="3"/>
    <!-- 光線 -->
    <line x1="0" y1="-30" x2="0" y2="-5" stroke="#7EC8E3" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="-30" y1="-20" x2="-18" y2="-8" stroke="#7EC8E3" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="30" y1="-20" x2="18" y2="-8" stroke="#7EC8E3" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="-48" y1="-5" x2="-35" y2="2" stroke="#4A9BD9" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
    <line x1="48" y1="-5" x2="35" y2="2" stroke="#4A9BD9" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
    <!-- 水面の反射 -->
    <line x1="-20" y1="30" x2="20" y2="30" stroke="#7EC8E3" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="-12" y1="38" x2="12" y2="38" stroke="#4A9BD9" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
  </g>
  <!-- テキスト -->
  <text x="400" y="275" text-anchor="middle" font-family="'Montserrat', 'Helvetica Neue', sans-serif" font-size="72" font-weight="600" letter-spacing="14" fill="#1A365D">UMIDAS</text>
  <text x="400" y="315" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="13" fill="#4A9BD9" letter-spacing="6">新しい価値が、水平線から昇る</text>
</svg>
