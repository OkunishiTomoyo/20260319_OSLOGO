<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="gy46" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7EC8E3"/>
      <stop offset="100%" stop-color="#2B6CB0"/>
    </linearGradient>
    <linearGradient id="gy46s" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A9BD9"/>
      <stop offset="100%" stop-color="#1A365D"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="#FFFFFF"/>
  <!-- エレガントスウィープ — 洗練されたストロークが文字を横切る -->
  <g transform="translate(400, 155)">
    <!-- 読みやすいベース文字（やや斜体・セリフ寄り） -->
    <text x="-15" y="5" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" font-size="82" font-weight="400" font-style="italic" letter-spacing="12" fill="url(#gy46)">UMIDAS</text>
    <!-- Yohji的なスウィープライン1（文字を横切る長い斜めストローク） -->
    <path d="M-340,65 C-250,30 -100,-20 50,-35 C200,-50 300,-42 350,-48"
          fill="none" stroke="url(#gy46s)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <!-- スウィープライン2（上部） -->
    <path d="M-280,-55 C-150,-62 50,-50 200,-58 C280,-62 320,-55 340,-60"
          fill="none" stroke="url(#gy46)" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
  </g>
</svg>
