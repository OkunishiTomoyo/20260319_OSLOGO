<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="800" height="260">
  <defs>
    <linearGradient id="gc57a" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#A3D9F5"/>
      <stop offset="100%" stop-color="#5BA4D9"/>
    </linearGradient>
    <linearGradient id="gc57b" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#6BB8E8"/>
      <stop offset="100%" stop-color="#3B82C4"/>
    </linearGradient>
    <linearGradient id="gc57t" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5BA4D9"/>
      <stop offset="100%" stop-color="#2E75B6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="260" fill="#FFFFFF"/>
  <!-- ツインドロップ — 2つの水滴が寄り添う（リクルート/エン・ジャパン風） -->
  <g transform="translate(150, 118)">
    <!-- 大きい水滴（青） -->
    <path d="M8,-48 C12,-40 30,-12 30,8 C30,26 20,38 8,38 C-4,38 -14,26 -14,8 C-14,-12 4,-40 8,-48Z"
          fill="url(#gc57b)"/>
    <!-- 小さい水滴（水色・寄り添う） -->
    <path d="M-22,-28 C-19,-22 -10,-6 -10,6 C-10,16 -15,22 -22,22 C-29,22 -34,16 -34,6 C-34,-6 -25,-22 -22,-28Z"
          fill="url(#gc57a)" opacity="0.8"/>
    <!-- 白いハイライト -->
    <circle cx="14" cy="-8" r="5" fill="#FFFFFF" opacity="0.35"/>
    <circle cx="-18" cy="-4" r="3" fill="#FFFFFF" opacity="0.3"/>
  </g>
  <!-- テキスト -->
  <text x="478" y="112" text-anchor="middle" font-family="'Nunito', 'Quicksand', sans-serif" font-size="60" font-weight="700" letter-spacing="7" fill="url(#gc57t)">UMIDAS</text>
  <text x="478" y="145" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="11" letter-spacing="4" fill="#5BA4D9" opacity="0.6">心に余裕を生み出す</text>
</svg>
