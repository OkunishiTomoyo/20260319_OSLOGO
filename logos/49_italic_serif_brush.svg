<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="gy49" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7EC8E3"/>
      <stop offset="35%" stop-color="#4A9BD9"/>
      <stop offset="100%" stop-color="#2B6CB0"/>
    </linearGradient>
    <linearGradient id="gy49b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A9BD9"/>
      <stop offset="100%" stop-color="#1A365D"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="#FFFFFF"/>
  <!-- イタリックセリフブラシ — セリフ体イタリックを筆風にアレンジ -->
  <g transform="translate(400, 152)">
    <!-- U — イタリック寄り、セリフ風の入り -->
    <path d="M-305,-42 L-285,-42" fill="none" stroke="url(#gy49)" stroke-width="2" stroke-linecap="round"/>
    <path d="M-295,-42 L-290,22 C-287,42 -268,45 -258,25 L-252,-42"
          fill="none" stroke="url(#gy49)" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M-262,-42 L-242,-42" fill="none" stroke="url(#gy49)" stroke-width="2" stroke-linecap="round"/>
    <!-- M — セリフ付きイタリック -->
    <path d="M-222,-42 L-218,38 L-195,-38 L-172,38 L-168,-42"
          fill="none" stroke="url(#gy49)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- I — 太めのストローク+上下セリフ -->
    <path d="M-152,-42 L-138,-42" fill="none" stroke="url(#gy49)" stroke-width="2" stroke-linecap="round"/>
    <path d="M-145,-42 L-142,38" fill="none" stroke="url(#gy49)" stroke-width="6" stroke-linecap="round"/>
    <path d="M-152,38 L-132,38" fill="none" stroke="url(#gy49)" stroke-width="2" stroke-linecap="round"/>
    <!-- D -->
    <path d="M-108,38 L-108,-42" fill="none" stroke="url(#gy49)" stroke-width="5" stroke-linecap="round"/>
    <path d="M-108,-42 C-75,-48 -50,-18 -50,2 C-50,22 -75,42 -108,38"
          fill="none" stroke="url(#gy49)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- A -->
    <path d="M-15,38 L18,-42 L52,38" fill="none" stroke="url(#gy49)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M-3,10 L40,10" fill="none" stroke="url(#gy49)" stroke-width="5" stroke-linecap="round"/>
    <!-- S -->
    <path d="M90,-22 C82,-42 65,-45 62,-28 C58,-8 92,-2 90,22 C88,42 68,45 55,32"
          fill="none" stroke="url(#gy49)" stroke-width="4" stroke-linecap="round"/>
    <!-- Yohji的ロングストローク（上に走る） -->
    <path d="M55,32 C95,12 160,-10 280,-25 C300,-28 315,-25 320,-28"
          fill="none" stroke="url(#gy49b)" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>
    <!-- 上部にもう一本 -->
    <path d="M-108,-42 C-40,-55 80,-52 280,-58"
          fill="none" stroke="url(#gy49)" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
  </g>
</svg>
