<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="gy48" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2B6CB0"/>
      <stop offset="40%" stop-color="#4A9BD9"/>
      <stop offset="80%" stop-color="#7EC8E3"/>
      <stop offset="100%" stop-color="#A8DEF0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="#FFFFFF"/>
  <!-- 太細ミックス — Yohji的な太細コントラスト×読みやすいフォルム -->
  <g transform="translate(400, 150)">
    <!-- U — 左太・右細（筆の角度） -->
    <path d="M-298,-40 L-295,20 C-292,40 -272,44 -262,25 L-258,-38"
          fill="none" stroke="url(#gy48)" stroke-width="9" stroke-linecap="round"/>
    <path d="M-265,25 L-258,-38" fill="none" stroke="url(#gy48)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- M — 縦太・斜め極細 -->
    <path d="M-230,38 L-228,-40" fill="none" stroke="url(#gy48)" stroke-width="9" stroke-linecap="round"/>
    <path d="M-228,-40 L-202,25 L-178,-40" fill="none" stroke="url(#gy48)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M-178,-40 L-175,38" fill="none" stroke="url(#gy48)" stroke-width="9" stroke-linecap="round"/>
    <!-- I — 最も太い -->
    <path d="M-150,-40 L-148,38" fill="none" stroke="url(#gy48)" stroke-width="12" stroke-linecap="round"/>
    <!-- D — 縦太・丸み細い -->
    <path d="M-118,38 L-118,-40" fill="none" stroke="url(#gy48)" stroke-width="9" stroke-linecap="round"/>
    <path d="M-118,-40 C-85,-48 -58,-20 -58,2 C-58,25 -85,42 -118,38"
          fill="none" stroke="url(#gy48)" stroke-width="2" stroke-linecap="round"/>
    <!-- A — 斜め極細・横棒太い -->
    <path d="M-20,38 L15,-40 L50,38" fill="none" stroke="url(#gy48)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M-8,12 L40,12" fill="none" stroke="url(#gy48)" stroke-width="9" stroke-linecap="round"/>
    <!-- S — 上が細く・下が太い -->
    <path d="M92,-25 C85,-42 68,-45 65,-30 C62,-12 70,-8 80,-5"
          fill="none" stroke="url(#gy48)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M80,-5 C95,0 100,12 98,25 C95,42 72,45 60,32"
          fill="none" stroke="url(#gy48)" stroke-width="8" stroke-linecap="round"/>
    <!-- ロングテール -->
    <path d="M60,32 C120,10 220,-10 310,-20" fill="none" stroke="url(#gy48)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <!-- 導入ストローク -->
    <path d="M-340,70 L-300,-38" fill="none" stroke="url(#gy48)" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  </g>
</svg>
