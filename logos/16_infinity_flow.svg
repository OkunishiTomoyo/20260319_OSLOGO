<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="g16" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7EC8E3"/>
      <stop offset="50%" stop-color="#4A9BD9"/>
      <stop offset="100%" stop-color="#2B6CB0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="#FFFFFF"/>
  <!-- 無限大+水流 — 持続的な価値創造 -->
  <g transform="translate(195, 160)">
    <!-- 無限大マーク（水流で描く） -->
    <path d="M0,0 C0,-35 -40,-35 -50,-18 C-60,0 -50,35 -30,35 C-10,35 0,10 0,0 C0,-10 10,-35 30,-35 C50,-35 60,0 50,18 C40,35 0,35 0,0Z" fill="none" stroke="url(#g16)" stroke-width="5" stroke-linecap="round"/>
    <!-- 流れるアクセント -->
    <circle cx="-40" cy="-15" r="3" fill="#7EC8E3" opacity="0.5"/>
    <circle cx="40" cy="15" r="3" fill="#2B6CB0" opacity="0.5"/>
  </g>
  <!-- テキスト -->
  <text x="520" y="155" text-anchor="middle" font-family="'Montserrat', 'Helvetica Neue', sans-serif" font-size="66" font-weight="600" letter-spacing="10" fill="#1A365D" dx="20">UMIDAS</text>
  <text x="540" y="192" text-anchor="middle" font-family="'Noto Sans JP', sans-serif" font-size="12" fill="#4A9BD9" letter-spacing="4">尽きない、生み出す力</text>
</svg>
